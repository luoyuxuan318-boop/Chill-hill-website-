  .main-header { padding:24px 36px; text-align:center; flex-shrink:0; border-bottom:1px solid rgba(0,0,0,0.05); background:rgba(255,255,255,0.3); backdrop-filter:blur(10px); position:relative; overflow:hidden; }

  .main-header .header-logo { height:44px; vertical-align:middle; margin-right:8px; }
    .main-header h1 { font-size:22px; font-weight:700; letter-spacing:6px; color:var(--text); }
  .main-header .en { font-size:10px; color:var(--text-light); margin-top:3px; letter-spacing:3px; text-transform:uppercase; }
  .content-area { flex:1; overflow-y:auto; padding:28px 32px 48px; }
  .content-area::-webkit-scrollbar { width:6px; }
  .content-area::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.1); border-radius:3px; }

  /* Section headers */
  .theme-header { margin-bottom:28px; }
  .theme-title { font-size:20px; font-weight:700; color:var(--text); letter-spacing:3px; }
  .theme-desc { font-size:12px; color:var(--text-light); margin-top:4px; padding-bottom:18px; border-bottom:1px solid rgba(0,0,0,0.06); }

  /* Our Design Section */
  .our-section { margin-bottom:36px; }

  .our-label .dot { width:8px; height:8px; background:var(--gold); border-radius:50%; }
  .our-label span { font-size:13px; font-weight:700; color:var(--accent); letter-spacing:2px; }
  .our-label .tag { font-size:10px; background:var(--sidebar-bg); color:var(--sidebar-active); padding:2px 10px; border-radius:3px; letter-spacing:1px; }
  .our-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:16px; }
  .our-card { background:var(--card-bg); border:2px dashed var(--accent-light); border-radius:var(--radius); overflow:hidden; transition:transform 0.2s, box-shadow 0.2s; }
  .our-card:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(139,111,71,0.12); border-color:var(--accent); }
  .our-card .img-wrap { width:100%; aspect-ratio:4/3; background:linear-gradient(135deg, #f5f0e8 0%, #ede6d8 100%); display:flex; align-items:center; justify-content:center; cursor:zoom-in; position:relative; }

  .our-card .img-wrap .hint { position:absolute; bottom:12px; left:12px; background:rgba(0,0,0,0.6); color:#ffd700; font-size:10px; padding:4px 8px; border-radius:3px; letter-spacing:1px; }
  .our-card .info { padding:12px 14px; }

  .tone-desc-line { font-size:13px; color:var(--text); line-height:1.6; margin:0 0 6px 0; }

  .brand-tone .brand-intro-block .brand-name { font-size:24px; font-weight:700; color:var(--text); letter-spacing:4px; }
  .brand-tone .brand-intro-block .brand-name .en { font-size:14px; font-weight:400; color:var(--text-light); letter-spacing:2px; margin-left:12px; }
  .brand-tone .brand-intro-block .brand-meta { display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
  .brand-tone .brand-intro-block .brand-meta .meta-item { font-size:11px; color:var(--accent); background:rgba(139,111,71,0.08); padding:4px 12px; border-radius:14px; letter-spacing:1px; }

  .brand-tone .brand-intro-block .brand-slogan { font-size:16px; font-weight:700; color:var(--accent); letter-spacing:3px; margin-top:12px; text-align:right; }

  .brand-tone .tone-text { background:var(--ref-bg); border-radius:var(--radius); padding:24px 28px; }
  .brand-tone .tone-text .tone-title { font-size:14px; font-weight:700; color:var(--text); letter-spacing:2px; margin-bottom:10px; }
  .brand-tone .tone-text .tone-body { font-size:12px; color:var(--text-light); line-height:1.8; }

  .brand-info .info-card .info-slogan { margin-top:16px; text-align:right; }
  .brand-info .info-card .info-slogan .cn { font-size:16px; font-weight:700; color:var(--accent); letter-spacing:3px; }
  .brand-info .info-card .info-slogan .en { font-size:11px; color:var(--text-light); letter-spacing:2px; margin-top:2px; }

  .section-divider { display:flex; align-items:center; gap:14px; margin:32px 0 20px; }

  .card .img-wrap:hover .zoom-hint { opacity:1; }
  .card .body { padding:12px 14px; }
  .card .store { font-size:13px; font-weight:700; color:var(--text); }
  .card .platform { display:inline-block; font-size:9px; padding:2px 7px; border-radius:3px; margin:4px 0 6px; font-weight:500; }

  .platform-douyin { background:#e0e0e0; color:#333; }
  .card .desc { font-size:11px; color:var(--text-light); line-height:1.5; }
  .card .tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
  .card .tags span { font-size:9px; padding:2px 7px; border-radius:8px; background:rgba(139,111,71,0.1); color:var(--accent); }

  /* Modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:1000; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s; }
  .modal-overlay.active { opacity:1; pointer-events:auto; }
  .modal-content { position:relative; max-width:90vw; max-height:90vh; display:flex; flex-direction:column; align-items:center; }
  .modal-content img { max-width:90vw; max-height:80vh; object-fit:contain; border-radius:4px; }
  .modal-info { color:#ccc; font-size:13px; margin-top:12px; text-align:center; }
  .modal-close { position:absolute; top:-40px; right:0; background:none; border:none; color:#fff; font-size:30px; cursor:pointer; line-height:1; opacity:0.7; }
  .modal-close:hover { opacity:1; }

  @media (max-width:768px) {
    body { flex-direction:column; }
    .sidebar { width:100%; min-width:100%; max-height:120px; flex-shrink:0; }
    .sidebar-nav { display:flex; overflow-x:auto; overflow-y:hidden; padding:4px 8px; gap:2px; }
    .nav-item { flex-shrink:0; padding:8px 12px; font-size:11px; border-left:none; border-bottom:2px solid transparent; white-space:nowrap; }
    .nav-item.active { border-left:none; border-bottom-color:var(--sidebar-active); }
    .nav-item .num { display:none; }
    .our-grid { grid-template-columns:1fr; }
    .cards-grid { grid-template-columns:1fr; }
    .main-header h1 { font-size:16px; letter-spacing:3px; }
  }
</style>
</head>

// Render
function renderSidebar() {
  var nav = document.getElementById('sidebarNav');
  var h = '';
  for (var i = 0; i < themes.length; i++) {
    h += '<div class="nav-item' + (i === 0 ? ' active' : '') + '" data-id="' + themes[i].id + '">'
      + '<span class="num">' + themes[i].num + '</span><span>' + themes[i].label + '</span></div>';
  }
  nav.innerHTML = h;
  nav.querySelectorAll('.nav-item').forEach(function(el) {
    el.addEventListener('click', function() {
      nav.querySelectorAll('.nav-item').forEach(function(e) { e.classList.remove('active'); });
      el.classList.add('active');
      renderTheme(el.dataset.id);
      document.getElementById('contentArea').scrollTop = 0;
    });
  });
}

function platformClass(src) {
  if (src.indexOf('小红书') >= 0) return 'platform-red';
  if (src.indexOf('抖音') >= 0) return 'platform-douyin';
  if (src.indexOf('Instagram') >= 0) return 'platform-purple';
  if (src.indexOf('Dezeen') >= 0 || src.indexOf('ArchDaily') >= 0) return 'platform-dezeen';
  return 'platform-website';
}

// Section DOM cache — keep rendered panels in DOM so images persist across navigation
var themeCache = {};

function setThemeContent(id, html) {
  var area = document.getElementById('contentArea');
  if (themeCache[id]) {
    for (var k in themeCache) { themeCache[k].style.display = 'none'; }
    themeCache[id].style.display = '';
    area.scrollTop = 0;
    return;
  }
  // First render for this theme: create panel
  if (Object.keys(themeCache).length === 0) { area.innerHTML = ''; }
  var panel = document.createElement('div');
  panel.className = 'theme-panel';
  panel.innerHTML = html;
  for (var k in themeCache) { themeCache[k].style.display = 'none'; }
  area.appendChild(panel);
  themeCache[id] = panel;
  area.scrollTop = 0;
}

function renderTheme(id) {
  var t = null;
  for (var i = 0; i < themes.length; i++) { if (themes[i].id === id) { t = themes[i]; break; } }
  if (!t) return;

  // Brand Info special section
  if (t.type === 'brand-info') {
    var kwHtml = '';
    for (var ki = 0; ki < t.keywords.length; ki++) {
      kwHtml += '<span>' + t.keywords[ki] + '</span>';
    }
    var html = ''
      + '<div class="theme-header">'
      + '<div class="theme-title">' + t.num + '　' + t.label + '</div>'
      + '<div class="theme-desc">' + t.desc + '</div>'
      + '</div>'

      + '<div class="brand-info">'
      + '<div class="info-card">'
      + '<div class="info-row"><span class="info-label">品牌名称</span><span class="info-value">' + t.brandNameCn + '</span><span class="info-value en">' + t.brandNameEn + '</span></div>'
      + '<div class="info-row"><span class="info-label">品牌行业</span><span class="info-value">' + t.industry + '</span></div>'
      + '<div class="info-row"><span class="info-label">品牌定位</span><span class="info-value">' + t.positioning + '</span></div>'
      + '<div class="info-row"><span class="info-label">品牌调性</span><div class="info-kw">' + kwHtml + '</div></div>'
      + '<hr class="info-divider">'
      + '<div class="info-intro">' + t.intro + '</div>'
      + '<div class="info-slogan"><div class="cn">' + t.sloganCn + '</div><div class="en">' + t.sloganEn + '</div></div>'
      + '</div>'
      + '</div>';
    setThemeContent(id, html);
    return;
  }

  // Space section (card grid, same as OURS)
  if (t.type === 'space') {
    var html = ''
      + '<div class="theme-header">'
      + '<div class="theme-title">' + t.num + '　' + t.label + '</div>'
      + '<div class="theme-desc">' + t.desc + '</div>'
      + '</div>'
      + '<div class="our-grid">';
    for (var si = 0; si < t.spaceImages.length; si++) {
      html += '<div class="our-card">'
        + '<div class="img-wrap" data-img="' + t.spaceImages[si].img + '" data-info="空间与氛围 — 图片 ' + (si + 1) + '">'
        + '<img src="' + t.spaceImages[si].img + '" alt="空间 ' + (si + 1) + '" loading="lazy" decoding="async" onerror="this.style.display=\'none\';">'
        + '</div>'
        + '</div>';
    }
    html += '</div>';
    setThemeContent(id, html);
    return;
  }

  // Brand Tone special section
  if (t.type === 'brand') {
    var descParts = t.desc.split('\\n');
    var descHtml = '';
    for (var d = 0; d < descParts.length; d++) {
      descHtml += '<p class="tone-desc-line">' + descParts[d] + '</p>';
    }
    var html = ''
      + '<div class="theme-header">'
      + '<div class="theme-title">' + t.num + '　' + t.label + '</div>'
      + '<div class="theme-desc">' + descHtml + '</div>'
      + '</div>'

      + '<div class="brand-tone">'
      + '<div class="our-grid">';
    for (var mi = 0; mi < t.moodImages.length; mi++) {
      html += '<div class="our-card">'
        + '<div class="img-wrap" data-img="' + t.moodImages[mi] + '" data-info="情绪版 ' + (mi + 1) + '">'
        + '<img src="' + t.moodImages[mi] + '" alt="情绪版 ' + (mi + 1) + '" loading="lazy" decoding="async" onerror="this.style.display=\'none\';">'
        + '</div>'
        + '</div>';
    }
    html += '</div>'
      + '</div>';
    setThemeContent(id, html);
    return;
  }

  // System images section (with labels) — may also have ours below
  if (t.systemImages) {
    var sysHtml = ''
      + '<div class="theme-header">'
      + '<div class="theme-title">' + t.num + '　' + t.label + '</div>'
      + '<div class="theme-desc">' + t.desc + '</div>'
      + '</div>'
      + '<div class="our-section">'
      + '<div class="our-label"><div class="dot"></div><span>包装系统方案</span></div>'
      + '<div class="our-grid">';
    for (var si = 0; si < t.systemImages.length; si++) {
      sysHtml += '<div class="system-item">'
        + '<div class="system-item-label">' + t.systemImages[si].label + '</div>'
        + '<div class="our-card">'
        + '<div class="img-wrap" data-img="' + t.systemImages[si].img + '" data-info="包装系统 — ' + t.systemImages[si].label + '">'
        + '<img src="' + t.systemImages[si].img + '" alt="' + t.systemImages[si].label + '" loading="lazy" decoding="async" onerror="this.style.display=\'none\';">'
        + '</div>'
        + '</div>'
        + '</div>';
    }
    sysHtml += '</div></div>';

    // Build "Our Design" cards if present
    if (t.ours && t.ours.length) {
      var ourHtml2 = '';
      for (var jj = 0; jj < t.ours.length; jj++) {
        var oo = t.ours[jj];
        ourHtml2 += '<div class="our-card">'
          + '<div class="img-wrap" data-img="' + oo.img + '" data-info="秋山有度 — ' + oo.title + '">'
          + '<img src="' + oo.img + '" alt="' + oo.title + '" loading="lazy" decoding="async" onerror="this.style.display=\'none\'">'
          + '</div>'
          + '<div class="info"><div class="title">' + oo.title + '</div><div class="sub">' + oo.sub + '</div></div>'
          + '</div>';
      }
      sysHtml += '<div class="our-section">'
        + '<div class="our-label"><div class="dot"></div><span>秋山 · 现有设计</span><div class="tag">OURS</div></div>'
        + '<div class="our-grid">' + ourHtml2 + '</div>'
        + '</div>';
    }
    setThemeContent(id, sysHtml);
    return;
  }

  // Build "Our Design" cards
  var ourHtml = '';
  for (var j = 0; j < t.ours.length; j++) {
    var o = t.ours[j];
    ourHtml += '<div class="our-card">'
      + '<div class="img-wrap" data-img="' + o.img + '" data-info="秋山有度 — ' + o.title + '">'
      + '<img src="' + o.img + '" alt="' + o.title + '" loading="lazy" decoding="async" onerror="this.style.display=\'none\'">'
      + '</div>'
      + '<div class="info"><div class="title">' + o.title + '</div><div class="sub">' + o.sub + '</div></div>'
      + '</div>';
  }

  var html = ''
    + '<div class="theme-header">'
    + '<div class="theme-title">' + t.num + '　' + t.label + '</div>'
    + '<div class="theme-desc">' + t.desc + '</div>'
    + '</div>'

    + (t.overview ? '<div class="our-section">'
      + '<div class="our-label"><div class="dot"></div><span>' + t.overview.label + '</span></div>'
      + '<div class="our-grid"><div class="our-card">'
      + '<div class="img-wrap" data-img="' + t.overview.img + '" data-info="' + t.overview.label + '">'
      + '<img src="' + t.overview.img + '" alt="' + t.overview.label + '" loading="lazy" decoding="async" onerror="this.style.display=\'none\';">'
      + '</div>'
      + '</div></div>'
      + '</div>' : '')
    + '<div class="our-section">'
    + '<div class="our-label"><div class="dot"></div><span>秋山 · 现有设计</span><div class="tag">OURS</div></div>'
    + '<div class="our-grid">' + ourHtml + '</div>'
    + '</div>';
  setThemeContent(id, html);
}

// Delegated zoom handler for all images
document.getElementById('contentArea').addEventListener('click', function(e) {
  var target = e.target.closest('[data-img]');
  if (!target) return;
  document.getElementById('modalImg').src = target.dataset.img;
  document.getElementById('modalInfo').textContent = target.dataset.info || '';
  document.getElementById('modalOverlay').classList.add('active');
});

// Modal events
document.getElementById('modalClose').addEventListener('click', function() {
  document.getElementById('modalOverlay').classList.remove('active');
});
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('active');
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('active');
});

// Init
renderSidebar();
renderTheme(themes[0].id);
</script>
